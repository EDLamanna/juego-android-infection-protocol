name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]

jobs:
  flutter-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Block accidental secret files
        run: |
          if git ls-files --error-unmatch android/key.properties >/dev/null 2>&1; then
            echo "ERROR: android/key.properties está versionado. Debe permanecer fuera de git."
            exit 1
          fi
          tracked_keystores=$(git ls-files | grep -E '\.(jks|keystore)$' || true)
          if [ -n "$tracked_keystores" ]; then
            echo "ERROR: Se detectó keystore versionado."
            echo "$tracked_keystores"
            exit 1
          fi

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test --no-pub
