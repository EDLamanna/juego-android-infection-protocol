title = "infection_protocol gitleaks config"

[extend]
useDefault = true

[[allowlists]]
description = "Allowlist para falsos positivos controlados"
paths = [
  '''android/key.properties.example''',
]

[[rules]]
id = "android-keystore-password"
description = "Detecta passwords de keystore Android"
regex = '''(?i)(storePassword|keyPassword)\s*=\s*[^\s#]{8,}'''
path = '''(?i)key\.properties$'''
tags = ["android", "keystore", "password"]
